<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Products · AquaLease Nigeria</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2300875A' d='M12 3C8 9 6 12 6 15a6 6 0 0 0 12 0c0-3-2-6-6-12z'/></svg>" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body data-page="products">
  <div id="offline-banner" class="offline-banner">Offline mode · showing cached information</div>
  <div id="app-header"></div>

  <main class="page">
    <section class="page-head">
      <div class="container">
        <div class="crumbs"><a href="index.html">Home</a> <span>›</span> <span data-i18n="nav.products"></span></div>
        <div class="row">
          <div>
            <h1 data-i18n="products.title"></h1>
            <p class="sub" data-i18n="products.sub"></p>
          </div>
          <a class="btn btn-primary" href="mall.html" data-i18n="hero.cta"></a>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="toolbar">
          <div class="filter-pills" id="filterPills">
            <button class="filter-pill active" data-cat="all" data-i18n="products.filters.all"></button>
            <button class="filter-pill" data-cat="residential" data-i18n="products.filters.residential"></button>
            <button class="filter-pill" data-cat="commercial" data-i18n="products.filters.commercial"></button>
            <button class="filter-pill" data-cat="industrial" data-i18n="products.filters.industrial"></button>
          </div>
          <select class="sort-select" id="sortSelect">
            <option value="recent" data-i18n="products.sort_recent"></option>
            <option value="low" data-i18n="products.sort_low"></option>
            <option value="high" data-i18n="products.sort_high"></option>
          </select>
        </div>
        <div class="product-grid" id="grid"></div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="assets/i18n/strings.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let state = { cat: 'all', sort: 'recent' };

    function productImg(id) {
      return `assets/img/products/${encodeURIComponent(id)}`;
    }

    function renderProducts() {
      const cards = window.T.trArray('products.cards');
      if (!Array.isArray(cards)) return;
      let list = cards.slice();
      if (state.cat !== 'all') list = list.filter(c => c.cat === state.cat);
      if (state.sort === 'low') list.sort((a, b) => a.price - b.price);
      if (state.sort === 'high') list.sort((a, b) => b.price - a.price);
      const grid = document.getElementById('grid');
      grid.innerHTML = list.map(c => `
        <article class="product-card" data-cat="${c.cat}">
          <div class="pic">
            <span class="tag">${c.tag}</span>
            <img src="${productImg(c.img)}" alt="${c.name}" loading="lazy" />
          </div>
          <div class="body">
            <div class="cat">${c.cat.toUpperCase()} · ${c.spec.split('·')[0].trim()}</div>
            <h3>${c.name}</h3>
            <div class="spec">${c.spec}</div>
            <div class="price-row">
              <div class="v">${window.Money.format(c.price)}<small> / unit</small></div>
              <a class="btn btn-light btn-sm" href="mall.html">Lease now</a>
            </div>
          </div>
        </article>
      `).join('');
    }

    function bindProductUI() {
      document.getElementById('filterPills').addEventListener('click', e => {
        const b = e.target.closest('[data-cat]'); if (!b) return;
        document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        state.cat = b.dataset.cat;
        renderProducts();
      });
      document.getElementById('sortSelect').addEventListener('change', e => { state.sort = e.target.value; renderProducts(); });
    }

    function applyI18nProducts() {
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = window.T.tr(el.dataset.i18n));
      const sortMap = { recent: 'sort_recent', low: 'sort_low', high: 'sort_high' };
      document.querySelectorAll('#sortSelect option').forEach(o => o.textContent = window.T.tr('products.' + sortMap[o.value]));
    }

    document.addEventListener('DOMContentLoaded', () => { applyI18nProducts(); renderProducts(); bindProductUI(); });
  </script>
</body>
</html>
